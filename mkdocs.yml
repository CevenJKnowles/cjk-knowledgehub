site_name: CJK KnowledgeHub
site_url: https://cevenjknowles.github.io/cjk-knowledgehub/
site_description: AI Systems Design | Governed LLM Infrastructure | Workflow Architecture
site_author: Ceven Jupiter Knowles

docs_dir: docs
site_dir: site

repo_url: https://github.com/CevenJKnowles/cjk-knowledgehub
repo_name: CevenJKnowles/cjk-knowledgehub

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.annotate
    - content.code.copy

nav:
  - Home: index.md

  - Work:
      - Overview: work/index.md
      - Projects:
          - Overview: work/projects/index.md
          - IO-III Architecture: work/projects/io-iii-architecture.md
          - Prompt Pattern Library: work/projects/prompt-pattern-library.md
          - KnowledgeHub Governance: work/projects/knowledgehub-governance.md
          - Agentic Applications: work/projects/agentic-applications.md
      - Professional History:
          - Overview: work/history/index.md
          - Simpleshow GmbH: work/history/simpleshow.md
          - Interdisciplinary Design: work/history/interdisciplinary-design.md
          - LUDWIG Bar / Gallery / Venue: work/history/ludwig.md
      - Contributions:
          - Overview: work/contributions/index.md

  - Method:
      - Overview: method/index.md
      - Architecture Decision Records: method/architecture-decision-records.md
      - Design Principles: method/design-principles.md
      - Testing and Documentation: method/testing-and-documentation.md

  - Credentials:
      - Overview: credentials/index.md
      - AI Engineering and Governance: credentials/ai-engineering-governance.md
      - Statistical and Mathematical Foundations: credentials/statistical-mathematical.md
      - Python and Development Tooling: credentials/python-development.md

  - About: about/index.md

  - Legacy: legacy/index.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CevenJKnowles
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/cevenknowles/
    - icon: fontawesome/brands/behance
      link: https://www.behance.net/cevenknowles

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
