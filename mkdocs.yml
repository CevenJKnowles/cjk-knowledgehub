site_name: CJK KnowledgeHub
site_url: https://cevenjknowles.github.io/cjk-knowledgehub/
site_description: AI Systems Design | Governed LLM Infrastructure | Workflow Architecture
site_author: Ceven Jupiter Knowles

docs_dir: docs
site_dir: site

repo_url: https://github.com/CevenJKnowles/cjk-knowledgehub
repo_name: CevenJKnowles/cjk-knowledgehub

theme:
  name: material
  language: en
  logo: assets/images/logo-512.png
  favicon: assets/images/logo-32.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Barlow
    code: Hack
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.annotate
    - content.code.copy

nav:
  - Home: index.md

  - Projects:
      - Overview: projects/index.md
      - 10³ Architecture: projects/io-iii-architecture.md
      - Prompt Pattern Library: projects/prompt-pattern-library.md
      - KnowledgeHub Governance: projects/knowledgehub-governance.md

  - Experience:
      - Overview: experience/index.md
      - Simpleshow GmbH: experience/simpleshow.md
      - Interdisciplinary Design: experience/interdisciplinary-design.md
      - LUDWIG Bar / Gallery / Venue: experience/ludwig.md

  - Method:
      - Overview: method/index.md
      - How I Work: method/how-i-work.md
      - Architecture Decision Records: method/architecture-decision-records.md
      - Tools and Environment: method/tools-and-environment.md

  - Credentials:
      - Overview: credentials/index.md
      - AI Engineering and Governance: credentials/ai-engineering-governance.md
      - Statistical and Mathematical Foundations: credentials/statistical-mathematical.md

  - About: about/index.md

  - Legacy: legacy/index.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Projects: Projekte
            Overview: Überblick
            Experience: Erfahrung
            Method: Methode
            Credentials: Zertifikate
            About: Über mich
            Legacy: Vermächtnis
            10³ Architecture: 10³ Architecture
            Prompt Pattern Library: Prompt-Musterbibliothek
            KnowledgeHub Governance: KnowledgeHub Governance
            Simpleshow GmbH: Simpleshow GmbH
            Interdisciplinary Design: Interdisziplinäres Design
            LUDWIG Bar / Gallery / Venue: LUDWIG Bar / Galerie / Venue
            How I Work: Meine Arbeitsweise
            Architecture Decision Records: Architecture Decision Records
            Tools and Environment: Werkzeuge und Umgebung
            AI Engineering and Governance: KI-Engineering und Governance
            Statistical and Mathematical Foundations: Statistische und mathematische Grundlagen

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CevenJKnowles
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/cevenknowles/
    - icon: simple/bluesky
      link: https://bsky.app/profile/cevenknowles.bsky.social
    - icon: fontawesome/brands/behance
      link: https://www.behance.net/cevenknowles
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/cevenknowles
    - icon: fontawesome/brands/stack-overflow
      link: https://stackoverflow.com/users/31796358/ceven-jupiter-knowles

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

---